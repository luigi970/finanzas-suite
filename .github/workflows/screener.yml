name: Run Screener

on:
  schedule:
    # Corre a las 2am UTC (11pm ARG / 10pm EST) todos los días
    - cron: "0 2 * * *"
  repository_dispatch:
    types: [run-screener]
  workflow_dispatch:
    inputs:
      list_id:
        description: "Lista a analizar"
        required: false
        default: "sp500"
      crypto_limit:
        description: "Máximo de criptos (si list_id=crypto)"
        required: false
        default: "20"

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: "!(github.event_name == 'repository_dispatch' && github.event.client_payload.list_id == 'custom')"

    strategy:
      fail-fast: false
      matrix:
        list_id: [sp500, nasdaq100, etfs, adrs_arg, crypto, commodities]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Determine params
        id: list
        run: |
          EVENT="${{ github.event_name }}"
          MATRIX="${{ matrix.list_id }}"

          if [ "$EVENT" = "repository_dispatch" ]; then
            TARGET="${{ github.event.client_payload.list_id }}"
            CRYPTO_LIMIT="${{ github.event.client_payload.crypto_limit }}"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.list_id }}"
            CRYPTO_LIMIT="${{ github.event.inputs.crypto_limit }}"
          else
            # cron: corre todo el matrix, no crypto
            TARGET="$MATRIX"
            CRYPTO_LIMIT=20
            [ "$MATRIX" = "crypto" ] && TARGET=""
          fi

          if [ "$TARGET" = "$MATRIX" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
          echo "crypto_limit=${CRYPTO_LIMIT:-20}" >> $GITHUB_OUTPUT

      - name: Run screener
        if: steps.list.outputs.skip != 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DB_ID: ${{ secrets.CF_D1_DB_ID }}
        run: |
          cd backend
          python run_job.py --list ${{ matrix.list_id }} --crypto-limit ${{ steps.list.outputs.crypto_limit }}

  screener-custom:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'repository_dispatch' && github.event.client_payload.list_id == 'custom'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run screener (custom)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DB_ID: ${{ secrets.CF_D1_DB_ID }}
        run: |
          cd backend
          python run_job.py --list custom --custom-tickers "${{ github.event.client_payload.custom_tickers }}"
