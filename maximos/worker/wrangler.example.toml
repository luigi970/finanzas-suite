# Copiá este archivo como wrangler.toml y completá los valores.
# account_id lo podés omitir si tenés CLOUDFLARE_ACCOUNT_ID como env var.

name = "maximos-worker"
main = "src/entry.py"
compatibility_date = "2025-01-15"
compatibility_flags = ["python_workers"]
workers_dev = true

[[d1_databases]]
binding = "maximos_db"
database_name = "maximos-db"
database_id = "TU_D1_DATABASE_ID"

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
